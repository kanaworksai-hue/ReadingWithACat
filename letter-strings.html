<style>
  :root{
    --paper:#f3efe6;
    --paper2:#e7e1d3;
    --ink:#161310;
    --card:#23262d;
    --card2:#1b1e24;
  }
  /* 猫の肉球カーソル */
  :root{
    --paw:url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzOCIgaGVpZ2h0PSIzOCIgdmlld0JveD0iMCAwIDM4IDM4Ij48ZyBmaWxsPSIjMmYyMzIwIiBzdHJva2U9IiNmZmZmZmYiIHN0cm9rZS13aWR0aD0iMS4zIj48ZWxsaXBzZSBjeD0iMTkiIGN5PSIyNS41IiByeD0iOC44IiByeT0iNy40Ii8+PGVsbGlwc2UgY3g9IjkuNSIgY3k9IjE3IiByeD0iMy4yIiByeT0iNC4yIi8+PGVsbGlwc2UgY3g9IjE2IiBjeT0iMTEuNSIgcng9IjMuMiIgcnk9IjQuNSIvPjxlbGxpcHNlIGN4PSIyMi41IiBjeT0iMTEuNSIgcng9IjMuMiIgcnk9IjQuNSIvPjxlbGxpcHNlIGN4PSIyOSIgY3k9IjE3IiByeD0iMy4yIiByeT0iNC4yIi8+PC9nPjwvc3ZnPgo=") 19 22;
    --paw-grab:url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzNiIgaGVpZ2h0PSIzNiIgdmlld0JveD0iMCAwIDM4IDM4Ij48ZyBmaWxsPSIjOWE0YjNiIiBzdHJva2U9IiNmZmZmZmYiIHN0cm9rZS13aWR0aD0iMS4zIj48ZWxsaXBzZSBjeD0iMTkiIGN5PSIyNCIgcng9IjguNCIgcnk9IjcuMiIvPjxlbGxpcHNlIGN4PSIxMC41IiBjeT0iMTYuNSIgcng9IjMuMSIgcnk9IjQiLz48ZWxsaXBzZSBjeD0iMTYuMyIgY3k9IjEyIiByeD0iMy4xIiByeT0iNC4zIi8+PGVsbGlwc2UgY3g9IjIxLjciIGN5PSIxMiIgcng9IjMuMSIgcnk9IjQuMyIvPjxlbGxpcHNlIGN4PSIyNy41IiBjeT0iMTYuNSIgcng9IjMuMSIgcnk9IjQiLz48L2c+PC9zdmc+Cg==") 18 20;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;-webkit-text-size-adjust:100%;text-size-adjust:100%;overscroll-behavior:none;}
  body{
    background:radial-gradient(120% 80% at 50% 0%, #faf7f0 0%, var(--paper) 45%, var(--paper2) 100%);
    color:var(--ink);
    font-family:"Noto Serif JP",serif;
    display:flex;
    justify-content:center;
    min-height:100%;
    overflow-x:hidden;
    cursor:var(--paw), auto;   /* 全体を肉球に（タッチ端末では無視される） */
  }
  .frame{
    width:100%;
    max-width:480px;
    min-height:100vh;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    padding:18px 16px 18px;
    position:relative;
  }
  /* 上部：ロゴ(左) と プロジェクト名(右) */
  .topbar{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
  .logo{
    display:flex; flex-direction:column; align-items:flex-start; gap:4px;
    text-decoration:none; cursor:var(--paw), pointer;
    transition:transform .15s ease, opacity .15s ease;
  }
  .logo:hover{ transform:translateY(-1px); opacity:.85; }
  .logo img{ height:46px; width:auto; display:block; }
  .logo img.miss{ display:none; }
  .logo-fallback{ display:none; height:46px; width:auto; }
  .logo .handle{
    font-family:"JetBrains Mono",monospace; font-size:10px; letter-spacing:.08em; color:#6c6150;
    display:flex; align-items:center; gap:.35em;
  }
  .logo .x{
    display:inline-flex; width:13px; height:13px; align-items:center; justify-content:center;
    border-radius:3px; background:#111; color:#fff; font-size:8px; font-weight:700;
  }
  .brand{ text-align:right; line-height:1.25; padding-top:2px; }
  .brand-jp{
    font-family:"Shippori Mincho",serif; font-weight:700; font-size:18px; letter-spacing:.04em; color:var(--ink);
  }
  .brand-jp .seal{
    display:inline-block; background:#9a3b2f; color:#f6efe0;
    border-radius:4px; padding:.02em .14em; margin-right:.12em;
    font-weight:700; line-height:1; transform:translateY(-.04em);
    box-shadow:0 1px 2px rgba(0,0,0,.2), inset 0 0 0 1px rgba(246,239,224,.35);
  }
  .brand-en{
    font-family:"JetBrains Mono",monospace; font-weight:500; font-size:9.5px; letter-spacing:.12em; color:#9b8e76; margin-top:3px;
  }

  .stage{
    position:relative;
    flex:1 1 auto;
    margin:10px 0 4px;
    min-height:56vh;
    display:flex;
  }
  canvas{ width:100%; height:100%; display:block; touch-action:none; cursor:var(--paw), grab; }
  canvas:active{ cursor:var(--paw-grab), grabbing; }
  .hint{
    position:absolute;
    left:50%;
    bottom:4px;
    transform:translateX(-50%);
    font-size:11px;
    letter-spacing:.16em;
    color:#a79c86;
    pointer-events:none;
    transition:opacity .8s ease;
    text-align:center;
  }
  .caption{
    font-family:"Shippori Mincho",serif;
    font-weight:600;
    font-size:clamp(14px,4.4vw,18px);
    color:var(--ink);
    margin:4px 2px 10px;
    display:flex;
    align-items:center;
    gap:.4em;
  }
  .caption .q{color:#9a4b3b;}
  .panel{
    background:linear-gradient(180deg,var(--card) 0%,var(--card2) 100%);
    border-radius:13px;
    overflow:hidden;
    box-shadow:0 14px 30px -16px rgba(0,0,0,.55), 0 2px 0 rgba(255,255,255,.04) inset;
  }
  .panel .bar{
    display:flex;align-items:center;gap:8px;
    padding:10px 13px;
    background:rgba(255,255,255,.03);
    border-bottom:1px solid rgba(255,255,255,.06);
  }
  .dot{width:10px;height:10px;border-radius:50%;}
  .dot.r{background:#ff5f57;}.dot.y{background:#febc2e;}.dot.g{background:#28c840;}
  .panel .file{margin-left:8px;font-family:"JetBrains Mono",monospace;font-size:11px;color:#9aa3b2;}
  #srcInput{
    width:100%;min-height:74px;resize:vertical;border:0;outline:none;background:transparent;
    color:#dfe3ea;font-family:"Noto Serif JP",serif;font-size:16px;line-height:1.7;padding:11px 15px 13px;display:block;
    cursor:text;
  }
  #srcInput::placeholder{color:#5d6273;}
</style>

<script>
(() => {
  const canvas = document.getElementById('curtain');
  const ctx = canvas.getContext('2d');
  const input = document.getElementById('srcInput');

  // ―― 物理パラメータ ――
  const GRAVITY  = 0.40;
  const FRICTION = 0.95;
  const STIFF    = 1.0;
  const ITER     = 14;
  const HOME     = 0.03;  // 復元バネ（離すと元の位置へ戻る・垂れ過ぎ防止）
  const MAXV     = 9;     // 慣性速度の上限
  const MM       = 13;    // 1フレームの総移動量の上限
  const clamp = (v, lo, hi) => v < lo ? lo : v > hi ? hi : v;

  let cols, rows, vSpacing, hSpacing, fs, beadMin, grabR2;
  let points = [], strands = [];
  let W = 0, H = 0, DPR = 1, topY = 0, baseX0 = 0, bottomY = 0;
  let currentText = Array.from(input.value);

  // ―― 漢字→ふりがな（『吾輩は猫である』冒頭の文脈に合わせた読み） ――
  const KANJI = {
    '吾':'わが','輩':'はい','猫':'ねこ','名':'な','前':'まえ','無':'な','生':'う',
    '見':'み','当':'とう','何':'なに','薄':'うす','暗':'くら','所':'ところ','泣':'な',
    '事':'こと','記':'き','憶':'おく','始':'はじ','人':'にん','間':'げん','中':'ちゅう',
    '一':'いち','番':'ばん','獰':'どう','悪':'あく','種':'しゅ','族':'ぞく','書':'しょ',
    '時':'とき','我':'われ','捕':'と','煮':'に','食':'く','話':'はなし','考':'かんが','聞':'き',
    '別':'べつ','段':'だん','恐':'おそ','思':'おも','彼':'かれ','掌':'てのひら','載':'の',
    '持':'も','上':'うえ','感':'かん','少':'すこ','落':'お','顔':'かお'
  };
  const isKata = ch => { const c = ch.charCodeAt(0); return c >= 0x30A1 && c <= 0x30FA; };
  const kataToHira = s => s.replace(/[ァ-ヺ]/g, m => String.fromCharCode(m.charCodeAt(0) - 0x60));
  function readingOf(ch) {
    if (KANJI[ch]) return KANJI[ch];
    if (isKata(ch)) return kataToHira(ch);
    return '';   // ひらがな・記号は発音＝自身なので注記しない
  }

  // ―― 既定の課文は「位置（文脈）」に基づく正しい読み ――
  // 同じ漢字でも語によって読みが変わる（見当=けん / 見た=み、何でも=なん 等）。
  const DEFAULT_TEXT = "吾輩は猫である。名前はまだ無い。どこで生れたかとんと見当がつかぬ。何でも薄暗いじめじめした所でニャーニャー泣いていた事だけは記憶している。吾輩はここで始めて人間というものを見た。";
  const DEFAULT_READINGS = [
    'わが','はい','は','ねこ','で','あ','る','','な','まえ','は','ま','だ','な','い','',
    'ど','こ','で','う','れ','た','か','と','ん','と','けん','とう','が','つ','か','ぬ','',
    'なん','で','も','うす','ぐら','い','じ','め','じ','め','し','た','ところ','で',
    'に','ゃ','ー','に','ゃ','ー','な','い','て','い','た','こと','だ','け','は','き','おく','し','て','い','る','',
    'わが','はい','は','こ','こ','で','はじ','め','て','にん','げん','と','い','う','も','の','を','み','た',''
  ];

  // ―― 文字の日本語発音を読み上げ（Web Speech API） ――
  let jaVoice = null;
  function pickVoice() {
    if (!('speechSynthesis' in window)) return;
    const vs = speechSynthesis.getVoices()
      .filter(v => /ja[-_]?JP/i.test(v.lang) || /japanese|日本/i.test(v.name));
    if (!vs.length) { jaVoice = null; return; }
    // できるだけ自然な音声を優先（Google / Siri / 拡張 / オンライン音声）
    jaVoice = vs.find(v => /google/i.test(v.name)) ||
              vs.find(v => /(siri|premium|enhanced|natural|o-?ren|kyoko)/i.test(v.name)) ||
              vs.find(v => v.localService === false) ||
              vs[0];
  }
  if ('speechSynthesis' in window) {
    pickVoice();
    speechSynthesis.addEventListener('voiceschanged', pickVoice);
  }
  const isLetter = ch => /[぀-ヿ一-鿿]/.test(ch);
  const pronOf = ch => readingOf(ch) || ch;
  function speak(ch, text) {
    if (!('speechSynthesis' in window) || !isLetter(ch)) return;
    const say = (text && text.length) ? text : pronOf(ch);
    try {
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(say);
      u.lang = 'ja-JP'; u.rate = 1.0; u.pitch = 1.0;   // 単語単位＋等速で自然に
      if (jaVoice) u.voice = jaVoice;
      speechSynthesis.speak(u);
    } catch (e) {}
  }

  // ―― kuromoji 形態素解析：任意の文章を文脈どおりに読む ――
  let tokenizer = null;
  let gChars = [], gReading = [], gWord = [], gWordRead = [], gWordId = [];
  const isKana = ch => { const c = ch.charCodeAt(0); return (c >= 0x3041 && c <= 0x309F) || (c >= 0x30A1 && c <= 0x30FF); };
  const toHira = s => kataToHira(s);

  // 単語の読み(ひらがな)を各文字に割り当て（先頭・末尾の送り仮名を処理）
  function fitReading(surface, reading) {
    const s = Array.from(surface), r = Array.from(reading), n = s.length;
    const res = new Array(n).fill('');
    if (n === 0) return res;
    let lead = 0; while (lead < n && isKana(s[lead])) lead++;
    let tail = 0; while (tail < n - lead && isKana(s[n - 1 - tail])) tail++;
    let rStart = 0, rEnd = r.length;
    for (let k = 0; k < lead; k++) { res[k] = s[k]; rStart++; }
    for (let k = 0; k < tail; k++) { res[n - 1 - k] = s[n - 1 - k]; rEnd--; }
    const mid = r.slice(rStart, Math.max(rStart, rEnd)).join('');
    const midLen = (n - tail) - lead;
    if (midLen === 1) res[lead] = mid;
    else if (midLen > 1) for (let k = lead; k < n - tail; k++) res[k] = mid; // 複合語は語全体の読みを各漢字へ
    return res;
  }

  // 入力テキスト → 文字 / 注音 / 単語の発音 / 単語の読み / 単語ID の配列（空白除外）
  function buildReadingArrays() {
    const raw = input.value;
    let chars = [], reading = [], word = [], wread = [], wid = [], used = false;
    if (tokenizer) {
      let tokens = null;
      try { tokens = tokenizer.tokenize(raw); } catch (e) { tokens = null; }
      if (tokens) {
        let id = 0;
        for (const tk of tokens) {
          const surf = Array.from(tk.surface_form);
          const rdg = (tk.reading && tk.reading !== '*') ? toHira(tk.reading) : tk.surface_form;       // 表記読み（注音用）
          const prn = (tk.pronunciation && tk.pronunciation !== '*') ? toHira(tk.pronunciation) : rdg;  // 発音（読み上げ用）
          const per = fitReading(tk.surface_form, rdg);
          for (let i = 0; i < surf.length; i++) {
            chars.push(surf[i]);
            reading.push(per[i] || (isLetter(surf[i]) ? surf[i] : ''));
            word.push(isLetter(surf[i]) ? prn : '');
            wread.push(isLetter(surf[i]) ? rdg : '');
            wid.push(id);
          }
          id++;
        }
        used = true;
      }
    }
    if (!used) {
      // フォールバック：既定課文は文脈読み、それ以外は1字ごとの近似読み（1字＝1語）
      chars = Array.from(raw).filter(ch => !/\s/.test(ch));
      if (chars.length === 0) chars = ['　'];
      const useDefault = chars.join('') === DEFAULT_TEXT && DEFAULT_READINGS.length === chars.length;
      reading = useDefault ? DEFAULT_READINGS.slice() : chars.map(ch => readingOf(ch) || (isLetter(ch) ? ch : ''));
      gChars = chars; gReading = reading; gWord = reading.slice(); gWordRead = reading.slice();
      gWordId = chars.map((_, i) => i);
      return;
    }
    const fc = [], fr = [], fw = [], fwr = [], fid = [];
    for (let i = 0; i < chars.length; i++) {
      if (!/\s/.test(chars[i])) { fc.push(chars[i]); fr.push(reading[i]); fw.push(word[i]); fwr.push(wread[i]); fid.push(wid[i]); }
    }
    if (fc.length === 0) { fc.push('　'); fr.push(''); fw.push(''); fwr.push(''); fid.push(0); }
    gChars = fc; gReading = fr; gWord = fw; gWordRead = fwr; gWordId = fid;
  }

  function setDictStatus(txt, done) {
    const el = document.getElementById('dictStatus');
    if (el) { el.textContent = txt; el.style.opacity = done ? '0.5' : '1'; }
  }

  function refreshTextModel() {
    buildReadingArrays();
    if (points.length) assignChars();
  }

  // 辞書を読み込み（失敗・オフラインでもフォールバックで動作）
  if (window.kuromoji) {
    setDictStatus('辞書を読込中…');
    let dictLoaded = false;
    const fallbackToApprox = txt => {
      if (dictLoaded) return;
      tokenizer = null;
      refreshTextModel();
      setDictStatus(txt, true);
    };
    const dictTimer = setTimeout(() => {
      fallbackToApprox('近似読み（辞書待機中）');
    }, 3000);
    try {
      kuromoji.builder({ dicPath: 'https://cdn.jsdelivr.net/npm/kuromoji@0.1.2/dict/' })
        .build((err, tk) => {
          clearTimeout(dictTimer);
          if (err || !tk) { fallbackToApprox('辞書読込失敗・近似読み'); return; }
          tokenizer = tk;
          dictLoaded = true;
          refreshTextModel();
          setDictStatus('辞書✓ 文脈で発音', true);
        });
    } catch (e) {
      clearTimeout(dictTimer);
      fallbackToApprox('近似読み');
    }
  } else {
    setDictStatus('近似読み（辞書なし）', true);
  }

  function build() {
    const rect = canvas.getBoundingClientRect();
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = rect.width; H = rect.height;
    canvas.width = Math.round(W * DPR);
    canvas.height = Math.round(H * DPR);
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

    const base = Math.max(13, Math.min(17, W / 22));
    vSpacing = base;            // 字間（縦）
    hSpacing = base * 1.34;     // 行間（列間）少し広め
    fs       = base * 0.86;     // 文字サイズ
    beadMin  = base * 0.86;     // 衝突＝文字幅ぶん
    grabR2   = (base * 2.2) ** 2;

    cols = Math.max(9, Math.floor((W * 0.92) / hSpacing));
    const usableH = H - base * 2.6;   // 最下行が切れないよう下に十分な余白
    rows = Math.max(12, Math.floor(usableH / vSpacing));

    const curtW = (cols - 1) * hSpacing;
    baseX0 = (W - curtW) / 2;
    topY = base * 0.95;
    bottomY = topY + (rows - 1) * vSpacing;

    points = [];
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const x = baseX0 + c * hSpacing;
        const y = topY + r * vSpacing;
        points.push({ x, y, ox: x, oy: y, r, c, pinned: r === 0, hx: x, hy: y, ch: '　', reading: '', word: '', wordRead: '', wordId: -1, grabbed: false, gdx: 0, gdy: 0 });
      }
    }
    strands = [];
    for (let c = 0; c < cols; c++) {
      const links = [];
      for (let r = 0; r < rows - 1; r++)
        links.push({ a: points[r * cols + c], b: points[(r + 1) * cols + c], rest: vSpacing });
      strands.push(links);
    }
    if (gChars.length === 0) buildReadingArrays();
    assignChars();
  }

  // 縦書き：右の列から、上から下へ
  function assignChars() {
    const n = gChars.length || 1;
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const strandFromRight = (cols - 1) - c;
        const idx = (strandFromRight * rows + r) % n;
        const p = points[r * cols + c];
        p.ch = gChars[idx] || '　';
        p.reading = gReading[idx] || '';
        p.word = gWord[idx] || '';
        p.wordRead = gWordRead[idx] || '';
        p.wordId = (gWordId[idx] != null) ? gWordId[idx] : -1;
      }
    }
  }

  // ―― ポインタ（つかんでドラッグ／なでる） ――
  const pointer = { x: -999, y: -999, px: -999, py: -999, down: false, inside: false, grab: null, wordBeads: null, type: 'mouse', grabTime: 0 };
  function localPos(e) {
    const rect = canvas.getBoundingClientRect();
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  }
  // 読み順インデックス k から珠を引く（縦書き：列=右から、行=上から下）
  function beadAtK(k) {
    if (k < 0 || k >= cols * rows) return null;
    const sfr = Math.floor(k / rows), r = k % rows, c = (cols - 1) - sfr;
    if (c < 0 || c >= cols) return null;
    return points[r * cols + c];
  }
  // つかんだ珠が属する「単語」の珠（読み順に連続する同一語ID）をまとめて返す
  function wordBeadsAt(bead) {
    const sfr = (cols - 1) - bead.c;
    const k0 = sfr * rows + bead.r;
    const wid = bead.wordId;
    const set = [bead];
    for (let k = k0 - 1; k >= 0; k--) { const b = beadAtK(k); if (b && !b.pinned && b.wordId === wid) set.unshift(b); else break; }
    for (let k = k0 + 1; k < cols * rows; k++) { const b = beadAtK(k); if (b && !b.pinned && b.wordId === wid) set.push(b); else break; }
    return set;
  }
  canvas.addEventListener('pointerdown', e => {
    const p = localPos(e);
    pointer.type = e.pointerType || 'mouse';
    pointer.x = pointer.px = p.x; pointer.y = pointer.py = p.y;
    pointer.down = true; pointer.inside = true;
    // 最寄りの珠をつかむ
    let best = null, bd = grabR2;
    for (const pt of points) {
      if (pt.pinned) continue;
      const d2 = (pt.x - p.x) ** 2 + (pt.y - p.y) ** 2;
      if (d2 < bd) { bd = d2; best = pt; }
    }
    pointer.grab = best;
    if (best) {
      const wb = wordBeadsAt(best);
      for (const b of wb) { b.gdx = b.x - p.x; b.gdy = b.y - p.y; b.grabbed = true; }
      pointer.wordBeads = wb;
      pointer.grabTime = performance.now();
      speak(best.ch, best.word || best.reading);   // 単語単位で自然に読み上げ
    }
    hideHint();
    canvas.setPointerCapture && canvas.setPointerCapture(e.pointerId);
    e.preventDefault();
  });
  canvas.addEventListener('pointermove', e => {
    const p = localPos(e);
    pointer.x = p.x; pointer.y = p.y; pointer.inside = true;
    e.preventDefault();
    hideHint();
  });
  function release() {
    if (pointer.wordBeads) for (const b of pointer.wordBeads) b.grabbed = false;
    pointer.down = false; pointer.grab = null; pointer.wordBeads = null;
  }
  window.addEventListener('pointerup', release);
  window.addEventListener('pointercancel', release);
  canvas.addEventListener('pointerleave', () => { if (!pointer.down) pointer.inside = false; });

  let hintHidden = false;
  function hideHint() {
    if (hintHidden) return;
    hintHidden = true;
    const h = document.getElementById('hint');
    if (h) h.style.opacity = '0';
  }
  setTimeout(hideHint, 6000);

  // 入力 → 珠を更新
  let typeTimer;
  input.addEventListener('input', () => {
    clearTimeout(typeTimer);
    typeTimer = setTimeout(() => {
      buildReadingArrays();
      assignChars();
      const cap = document.getElementById('capText');
      const t = input.value.replace(/\s+/g, '');
      if (cap) cap.textContent = t ? '「' + t.slice(0, 8) + (t.length > 8 ? '…' : '') + '」' : '「　」';
    }, 220);
  });
  input.addEventListener('focus', () => { pointer.inside = false; release(); });

  // ―― 物理更新 ――
  function update() {
    const pvx = clamp(pointer.x - pointer.px, -20, 20);
    const pvy = clamp(pointer.y - pointer.py, -20, 20);
    pointer.px = pointer.x; pointer.py = pointer.y;

    // 積分（重力＋減衰。風なし＝放置で静止）
    for (const p of points) {
      if (p.pinned) { p.x = p.hx; p.y = p.hy; p.ox = p.x; p.oy = p.y; continue; }
      let vx = (p.x - p.ox) * FRICTION;
      let vy = (p.y - p.oy) * FRICTION;
      const sp = Math.hypot(vx, vy);
      if (sp > MAXV) { const k = MAXV / sp; vx *= k; vy *= k; }
      p.ox = p.x; p.oy = p.y;
      p.x += vx; p.y += vy + GRAVITY;
      p.x += (p.hx - p.x) * HOME;   // 復元バネ
      p.y += (p.hy - p.y) * HOME;
    }

    // つかんだ「単語」の珠をまとめてカーソルに追従（離すと制約＆重力で一緒に戻る）
    const dragging = pointer.down && pointer.wordBeads;
    if (dragging) {
      for (const b of pointer.wordBeads) {
        b.x = clamp(pointer.x + b.gdx, 4, W - 4);
        b.y = clamp(pointer.y + b.gdy, topY, H - 2);
      }
    } else if (pointer.inside && !pointer.down) {
      // つかんでいない時は、なでると軽く揺れる
      const R = hSpacing * 3, R2 = R * R;
      for (const p of points) {
        if (p.pinned) continue;
        const dx = p.x - pointer.x, dy = p.y - pointer.y, d2 = dx * dx + dy * dy;
        if (d2 < R2) {
          const d = Math.sqrt(d2) || 0.001, fall = 1 - d / R;
          p.x += pvx * fall * 0.2;
          p.y += pvy * fall * 0.1;
        }
      }
    }

    // 縦糸の制約（各ストランド独立）。つかんだ珠は固定扱い。
    for (let k = 0; k < ITER; k++) {
      for (const links of strands) {
        for (const l of links) {
          const a = l.a, b = l.b;
          let dx = b.x - a.x, dy = b.y - a.y;
          const d = Math.sqrt(dx * dx + dy * dy) || 0.0001;
          const diff = ((l.rest - d) / d) * 0.5 * STIFF;
          const ox = dx * diff, oy = dy * diff;
          const aLock = a.pinned || a.grabbed, bLock = b.pinned || b.grabbed;
          if (!aLock) { a.x -= ox; a.y -= oy; }
          if (!bLock) { b.x += ox; b.y += oy; }
        }
      }
      for (const p of points) {
        if (p.pinned || p.grabbed) continue;
        if (p.x < 4) p.x = 4; else if (p.x > W - 4) p.x = W - 4;
        if (p.y > H - 2) p.y = H - 2;
      }
    }
    if (dragging) {
      for (const b of pointer.wordBeads) {
        b.x = clamp(pointer.x + b.gdx, 4, W - 4);
        b.y = clamp(pointer.y + b.gdy, topY, H - 2);
      }
    }

    // 1フレームの総移動量に上限（暴走の最終防止）
    for (const p of points) {
      if (p.pinned || p.grabbed) continue;
      const mx = p.x - p.ox, my = p.y - p.oy, m = Math.hypot(mx, my);
      if (m > MM) { const k = MM / m; p.x = p.ox + mx * k; p.y = p.oy + my * k; }
    }
  }

  // ―― 描画 ――
  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const baseFont = `${fs}px "Noto Serif JP", serif`;
    ctx.font = baseFont;
    const dragging = pointer.down && pointer.wordBeads && pointer.wordBeads.length;
    const sel = dragging ? new Set(pointer.wordBeads) : null;

    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const p = points[r * cols + c];
        const nb = r < rows - 1 ? points[(r + 1) * cols + c] : points[(r - 1) * cols + c];
        let ang = Math.atan2(nb.y - p.y, nb.x - p.x) - Math.PI / 2;
        if (r === rows - 1) ang += Math.PI;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(ang);
        ctx.fillStyle = (sel && sel.has(p)) ? '#9a4b3b' : '#171310';  // 選択中の単語を強調
        ctx.fillText(p.ch, 0, 0);
        ctx.restore();
      }
    }

    // 選択中の「単語」を大きなカードで表示（文字＋ふりがな）
    if (dragging) drawWordCard(pointer.wordBeads);
  }

  // Cat resting on the bottom frame: uniform tail with a rounded tip dangling outside, sways, occasionally opens eyes. ly = resting line
  function drawCat(cx, ly, s) {
    const ink = '#473b31', cream = '#f3ead9', nose = '#9a4b3b', amber = '#d6aa56', pupil = '#2a201a', D = Math.PI / 180;
    const now = performance.now() / 1000;
    const wag = Math.sin(now * 2.2) * s * 0.9;            // しっぽ先端の揺れ
    const cyc = now % 5.5; const open = (cyc > 4.4 && cyc < 5.3);  // ときどき目を開ける
    const brx = s * 1.25, bry = s * 0.5, bodyCy = ly - s * 0.16;
    ctx.save();
    ctx.lineJoin = 'round'; ctx.lineCap = 'round';
    ctx.fillStyle = ink; ctx.strokeStyle = ink;
    // Tail: uniform thickness, rounded tip, natural curve dangling outside the frame
    ctx.lineWidth = s * 0.3;
    ctx.beginPath();
    ctx.moveTo(cx + brx * 0.85, bodyCy);
    ctx.bezierCurveTo(cx + brx * 1.85, ly + s * 0.5, cx + brx * 1.95, ly + s * 1.4, cx + brx * 1.2 + wag, ly + s * 1.95);
    ctx.stroke();
    // 体
    ctx.beginPath(); ctx.ellipse(cx, bodyCy, brx, bry, 0, 0, Math.PI * 2); ctx.fill();
    // 前足（枠ふちに掛ける）
    ctx.beginPath(); ctx.ellipse(cx - brx * 0.725, ly + s * 0.135, brx * 0.225, s * 0.185, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx - brx * 0.335, ly + s * 0.16, brx * 0.215, s * 0.18, 0, 0, Math.PI * 2); ctx.fill();
    // 頭（左・低く）
    const hr = s * 0.54, hx = cx - brx * 0.72, hy = bodyCy - bry * 0.7;
    ctx.beginPath(); ctx.arc(hx, hy, hr, 0, Math.PI * 2); ctx.fill();
    // 耳
    ctx.beginPath(); ctx.moveTo(hx - hr * 0.7, hy - hr * 0.5); ctx.lineTo(hx - hr * 1.05, hy - hr * 1.5); ctx.lineTo(hx - hr * 0.05, hy - hr * 0.85); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(hx + hr * 0.1, hy - hr * 0.85); ctx.lineTo(hx + hr * 1.05, hy - hr * 1.5); ctx.lineTo(hx + hr * 0.72, hy - hr * 0.45); ctx.closePath(); ctx.fill();
    // 目（ときどき開く）
    const exs = [hx - hr * 0.34, hx + hr * 0.34];
    if (open) {
      for (const ex of exs) {
        ctx.fillStyle = amber; ctx.beginPath(); ctx.ellipse(ex, hy + hr * 0.2, hr * 0.2, hr * 0.22, 0, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = pupil; ctx.lineWidth = Math.max(1.5, hr * 0.12);
        ctx.beginPath(); ctx.moveTo(ex, hy + hr * 0.04); ctx.lineTo(ex, hy + hr * 0.36); ctx.stroke();
      }
      ctx.fillStyle = ink;
    } else {
      ctx.strokeStyle = cream; ctx.lineWidth = Math.max(2, hr * 0.16);
      for (const ex of exs) { ctx.beginPath(); ctx.arc(ex, hy + hr * 0.2, hr * 0.2, 200 * D, 340 * D); ctx.stroke(); }
    }
    // 鼻
    ctx.fillStyle = nose; ctx.beginPath(); ctx.moveTo(hx - hr * 0.12, hy + hr * 0.42); ctx.lineTo(hx + hr * 0.12, hy + hr * 0.42); ctx.lineTo(hx, hy + hr * 0.58); ctx.closePath(); ctx.fill();
    // ひげ
    ctx.strokeStyle = ink; ctx.lineWidth = Math.max(1, hr * 0.06);
    for (const dy of [0.0, 0.16]) {
      ctx.beginPath(); ctx.moveTo(hx - hr * 0.3, hy + hr * (0.5 + dy)); ctx.lineTo(hx - hr * 1.2, hy + hr * (0.37 + dy)); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(hx + hr * 0.3, hy + hr * (0.5 + dy)); ctx.lineTo(hx + hr * 1.2, hy + hr * (0.37 + dy)); ctx.stroke();
    }
    ctx.restore();
  }

  // 縦書きの「単語カード」（猫と一緒に読む風）
  function drawWordCard(cells) {
    const m = cells.length;
    const charFs = fs * 3.0, furiFs = fs * 1.18;
    const lineH = charFs * 1.16;
    const padTop = fs * 1.5, padSide = fs * 1.2;
    const furiColW = furiFs * 1.2;
    const textH = m * lineH;
    const catS = fs * 1.25;         // 猫の大きさ
    const catBand = catS * 2.1;     // 猫のための余白（少し上げた分も確保）
    const cardW = charFs + furiColW + padSide * 2;
    const cardH = padTop + textH + catBand;

    const cxC = clamp(pointer.x, cardW / 2 + 8, W - cardW / 2 - 8);
    const lift = (pointer.type === 'touch') ? cardH * 0.6 : cardH * 0.5;
    const cyC = clamp(pointer.y - lift, cardH / 2 + 8, H - cardH / 2 - catS * 2 - 8);
    const left = cxC - cardW / 2, top = cyC - cardH / 2;

    // 弾入アニメーション
    const t = clamp((performance.now() - (pointer.grabTime || 0)) / 170, 0, 1);
    const e = 1 - Math.pow(1 - t, 3);
    ctx.save();
    ctx.globalAlpha = e;
    ctx.translate(cxC, cyC); ctx.scale(0.86 + 0.14 * e, 0.86 + 0.14 * e); ctx.translate(-cxC, -cyC);

    // 台紙（クリーム・角丸・やわらかい影）
    roundRect(left, top, cardW, cardH, 16);
    ctx.shadowColor = 'rgba(60,40,25,0.30)'; ctx.shadowBlur = 26; ctx.shadowOffsetY = 10;
    const bg = ctx.createLinearGradient(0, top, 0, top + cardH);
    bg.addColorStop(0, '#f9f3e7'); bg.addColorStop(1, '#efe5d1');
    ctx.fillStyle = bg; ctx.fill();
    ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
    // 朱の二重枠
    ctx.strokeStyle = 'rgba(154,75,59,0.55)'; ctx.lineWidth = 1.4; ctx.stroke();
    roundRect(left + 5, top + 5, cardW - 10, cardH - 10, 12);
    ctx.strokeStyle = 'rgba(154,75,59,0.22)'; ctx.lineWidth = 1; ctx.stroke();

    // 縦書きの本文（中央列）
    const colX = left + padSide + charFs * 0.5;
    const startY = top + padTop + lineH * 0.5;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = `${charFs}px "Shippori Mincho","Noto Serif JP",serif`;
    ctx.fillStyle = '#1c1712';
    for (let i = 0; i < m; i++) ctx.fillText(cells[i].ch, colX, startY + i * lineH);

    // 右側に縦書きのふりがな（語全体の読み）
    const wr = Array.from(cells[0].wordRead || '');
    if (wr.length) {
      const fx = colX + charFs * 0.5 + furiColW * 0.5;
      const fStart = top + padTop + furiFs * 0.6;
      const span = Math.max(textH - furiFs * 1.2, wr.length * furiFs * 1.02);
      const step = wr.length > 1 ? span / (wr.length - 1) : 0;
      ctx.font = `${furiFs}px "Shippori Mincho","Noto Serif JP",serif`;
      ctx.fillStyle = '#9a4b3b';
      for (let i = 0; i < wr.length; i++) ctx.fillText(wr[i], fx, wr.length > 1 ? fStart + i * step : top + padTop + textH / 2);
    }

    // Cat resting on the frame (slightly raised; tail extends outside the frame)
    drawCat(cxC, top + cardH - catS * 0.4, catS);

    ctx.restore();
    ctx.font = baseFont;
  }

  function loop() {
    requestAnimationFrame(loop);
    update();
    draw();
  }

  function init() { build(); loop(); }
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(build);
  let rt;
  window.addEventListener('resize', () => { clearTimeout(rt); rt = setTimeout(build, 200); });
  init();
})();
</script>
</body>
</html>
